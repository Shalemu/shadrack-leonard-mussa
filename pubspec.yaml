name: mauzoApp
description: A new Flutter project.
version: 1.0.0+1

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.2.1
  carousel_slider: ^5.0.0
  # Uncomment one of the following alternatives if you want to replace chips_choice_null_safety
  # flutter_chips_input: ^1.0.0
  # flutter_tags: ^2.0.0
  chips_choice_null_safety: ^2.0.6 
  date_picker_timeline: ^1.2.3
  dotted_decoration: ^2.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_readmore: ^0.0.2
  flutter_svg: ^2.0.10+1
  flutter_switch: ^0.3.2
  get: ^4.6.6
  google_sign_in: ^6.2.1
  images_picker: ^1.2.11
  intl: ^0.19.0
  animate_do: ^3.0.2
  video_player: ^2.4.6
  google_maps_flutter: ^2.1.12
  permission_handler: ^11.3.1
  pin_code_fields: ^8.0.1
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.0.0+2
  readmore: ^3.0.0
  sms_autofill: ^2.0.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  http: ^1.2.2
  flutter_form_builder: ^9.4.1
  file_picker: ^8.1.2
  connectivity_plus: ^6.0.5
  ai_barcode_scanner: ^5.2.1
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1



 
  

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/logo.png
  fonts:
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/NotoSansJPMedium.otf
          weight: 500
        - asset: assets/fonts/NotoSansJPBold.otf
          weight: 700
        - asset: assets/fonts/NotoSansJPRegular.otf
          weight: 400
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSansBold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSansSemiBold.ttf
          weight: 600
